suite: deployment
release:
  name: cass-operator
templates:
  - templates/deployment.yaml
tests:
  - it: renders the operator deployment with the expected probes
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: cass-operator
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 65534
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 65534

  - it: omits explicit user and group when OpenShift mode is enabled
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      openshift.mode: enabled
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsUser
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: omits explicit user and group when OpenShift mode auto-detects OpenShift
    capabilities:
      apiVersions:
        - cert-manager.io/v1
        - security.openshift.io/v1
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsUser
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsGroup

  - it: keeps explicit user and group when OpenShift mode is disabled
    capabilities:
      apiVersions:
        - cert-manager.io/v1
        - security.openshift.io/v1
    set:
      openshift.mode: disabled
      securityContext.runAsUser: 1000740000
      securityContext.runAsGroup: 1000740000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000740000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 1000740000
